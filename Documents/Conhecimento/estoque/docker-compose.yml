services:
  postgres:
    image: postgres:16-alpine
    container_name: estoque-postgres
    environment:
      POSTGRES_DB: estoque
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - estoque_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  estoque_pgdata:
