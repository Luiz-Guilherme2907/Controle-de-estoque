spring:
  application:
    name: estoque
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/estoque}
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin123}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:chave-secreta-minima-de-256-bits-para-hmac-sha256-aqui}
    expiration-ms: ${JWT_EXPIRATION:86400000}

server:
  port: 8080
