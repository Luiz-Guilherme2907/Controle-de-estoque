spring:
  application:
    name: estoque
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/estoque}
    username: ${DB_USER:admin}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: 8080

logging:
  level:
    org.springframework.security: TRACE
